<!doctype html>
<html>
  <head>
    <title>{{ self.title }}</title>
  </head>
  <body>
    <h1>$$ self.heading</h1>
    %% if self.items.is_empty() {
    <p>Nothing to show.</p>
    %% } else {
    <ul>
      {% for item in &self.items { %}
      <li>{{ item.name }}: {{ item.price }}</li>
      {% } %}
    </ul>
    %% }
  </body>
</html>
